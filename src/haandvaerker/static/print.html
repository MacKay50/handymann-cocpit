<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dokument</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: #f0f2f5; color: #1a202c; font-size: 14px; line-height: 1.5; }
    .page { background: #fff; max-width: 800px; margin: 2rem auto; padding: 3rem 3.5rem;
            box-shadow: 0 4px 24px rgba(0,0,0,.1); border-radius: 4px; }
    .loading { padding: 4rem; text-align: center; color: #718096; font-size: .9rem; }
    .err { background: #fff5f5; border: 1px solid #fc8181; color: #c53030; border-radius: 8px;
           padding: 1rem; margin: 2rem; font-size: .9rem; }

    /* ── Print toolbar ── */
    .toolbar { max-width: 800px; margin: 1.5rem auto .5rem;
               display: flex; align-items: center; gap: .6rem; padding: 0 .5rem; }
    .btn-print { background: #2b6cb0; color: #fff; border: none; padding: .55rem 1.4rem;
                 border-radius: 7px; font-size: .9rem; font-weight: 600; cursor: pointer; }
    .btn-print:hover { background: #2c5282; }
    .toolbar-hint { font-size: .82rem; color: #718096; }

    /* ── Document layout ── */
    .doc-header { display: flex; justify-content: space-between; align-items: flex-start;
                  padding-bottom: 1.5rem; border-bottom: 3px solid #1a1a2e; margin-bottom: 2rem; }
    .doc-type { font-size: 2rem; font-weight: 800; color: #1a1a2e; letter-spacing: -.5px; }
    .doc-number { font-size: .95rem; color: #718096; margin-top: .2rem; }
    .company-block { text-align: right; }
    .company-logo { max-height: 60px; max-width: 180px; object-fit: contain; display: block;
                    margin-left: auto; margin-bottom: .4rem; }
    .company-name { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; }
    .company-detail { font-size: .82rem; color: #4a5568; margin-top: .15rem; }

    /* ── Parties ── */
    .parties { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
    .party-label { font-size: .72rem; font-weight: 700; text-transform: uppercase;
                   letter-spacing: .5px; color: #718096; margin-bottom: .35rem; }
    .party-name { font-size: .97rem; font-weight: 600; color: #1a202c; }
    .party-detail { font-size: .85rem; color: #4a5568; margin-top: .1rem; }
    .doc-meta { display: flex; flex-direction: column; gap: .3rem; align-items: flex-end; }
    .meta-row { display: flex; gap: .75rem; font-size: .85rem; }
    .meta-label { color: #718096; min-width: 90px; text-align: right; }
    .meta-val { font-weight: 500; color: #1a202c; }
    .meta-val.overdue { color: #c53030; }

    /* ── Line items ── */
    .lines-section { margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; font-size: .87rem; }
    thead th { text-align: left; padding: .5rem .7rem; font-size: .72rem; font-weight: 700;
               text-transform: uppercase; letter-spacing: .4px; color: #718096;
               border-bottom: 2px solid #e2e8f0; background: #f7fafc; }
    thead th.r { text-align: right; }
    tbody td { padding: .55rem .7rem; border-bottom: 1px solid #f0f2f5; }
    tbody tr:last-child td { border-bottom: none; }
    td.r { text-align: right; }
    td.bold { font-weight: 600; }

    /* ── Totals ── */
    .totals { display: flex; justify-content: flex-end; margin-bottom: 1.5rem; }
    .totals-inner { min-width: 280px; }
    .total-row { display: flex; justify-content: space-between; padding: .3rem 0;
                 font-size: .9rem; color: #4a5568; border-bottom: 1px solid #f0f2f5; }
    .total-row:last-child { border-bottom: none; }
    .total-row.final { font-size: 1.1rem; font-weight: 700; color: #1a202c;
                       border-top: 2px solid #1a1a2e; padding-top: .5rem; margin-top: .2rem; }
    .total-row.vat-note { font-size: .78rem; color: #718096; }

    /* ── Notes / status ── */
    .notes-box { background: #f7fafc; border-radius: 6px; padding: .85rem 1rem;
                 font-size: .87rem; color: #4a5568; border: 1px solid #e2e8f0;
                 margin-bottom: 1.5rem; white-space: pre-wrap; }
    .notes-label { font-size: .72rem; font-weight: 700; text-transform: uppercase;
                   letter-spacing: .5px; color: #718096; margin-bottom: .4rem; }
    .status-banner { padding: .75rem 1rem; border-radius: 6px; margin-bottom: 1.5rem;
                     font-size: .9rem; font-weight: 600; }
    .status-accepted { background: #f0fff4; border: 1.5px solid #68d391; color: #276749; }
    .status-rejected { background: #fff5f5; border: 1.5px solid #fc8181; color: #c53030; }
    .status-sent     { background: #fefcbf; border: 1.5px solid #f6e05e; color: #744210; }
    .status-paid     { background: #f0fff4; border: 1.5px solid #68d391; color: #276749; }

    /* ── Footer ── */
    .doc-footer { border-top: 1px solid #e2e8f0; padding-top: 1rem; margin-top: 2rem;
                  font-size: .78rem; color: #a0aec0; text-align: center; }

    /* ── Print rules ── */
    @media print {
      @page { margin: 1.5cm; }
      body { background: #fff; }
      .toolbar { display: none !important; }
      .page { box-shadow: none; margin: 0; padding: 0; max-width: 100%; border-radius: 0; }
      tr { page-break-inside: avoid; }
    }
  </style>
</head>
<body>

<div class="toolbar no-print" id="toolbar" style="display:none">
  <button class="btn-print" onclick="window.print()">🖨 Print / Gem som PDF</button>
  <span class="toolbar-hint">Ctrl+P · Vælg "Gem som PDF" i printer-dialogen</span>
</div>

<div id="root">
  <div class="loading">Indlæser dokument…</div>
</div>

<script>
const BASE = "";

function fmt(n) {
  return Number(n).toLocaleString("da-DK", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function fdate(d) {
  if (!d) return "—";
  const [y, m, day] = String(d).slice(0, 10).split("-");
  return `${day}/${m}/${y}`;
}
function statusLabel(s) {
  const map = { draft:"Kladde", sent:"Sendt", accepted:"Accepteret", rejected:"Afvist",
                paid:"Betalt", cancelled:"Annulleret" };
  return map[s] || s;
}
function isOverdue(dateStr) {
  return dateStr && dateStr < new Date().toISOString().slice(0, 10);
}

const params = new URLSearchParams(location.search);
const TYPE   = params.get("type");
const ID     = params.get("id");
const CID    = params.get("company_id");

async function load() {
  const root = document.getElementById("root");
  if (!TYPE || !ID || !CID) {
    root.innerHTML = '<div class="err">Mangler parametre: type, id og company_id er påkrævet.</div>';
    return;
  }
  try {
    if (TYPE === "quote")   await renderQuote(root);
    else if (TYPE === "invoice") await renderInvoice(root);
    else root.innerHTML = `<div class="err">Ukendt type: ${esc(TYPE)}</div>`;
    document.getElementById("toolbar").style.display = "";
    if (params.get("autoprint") === "1") setTimeout(() => window.print(), 400);
  } catch (e) {
    root.innerHTML = `<div class="err">Fejl: ${esc(e.message)}</div>`;
  }
}

async function fetchJSON(path) {
  const r = await fetch(BASE + path);
  if (!r.ok) throw new Error(`${r.status} — ${path}`);
  return r.json();
}

// ── QUOTE ─────────────────────────────────────────────────────────────────────
async function renderQuote(root) {
  const [q, company] = await Promise.all([
    fetchJSON(`/quotes/${ID}`),
    fetchJSON(`/companies/${CID}`),
  ]);
  document.title = `${q.quote_number} — ${company.name}`;

  // resolve customer via project
  let customer = null;
  let project  = null;
  try {
    project  = await fetchJSON(`/projects/${q.project_id}`);
    customer = await fetchJSON(`/customers/${project.customer_id}`);
  } catch (_) { /* optional */ }

  const linesHtml = (q.lines || []).map(l => `
    <tr>
      <td>${esc(l.description)}</td>
      <td>${esc(l.unit || "")}</td>
      <td class="r">${l.quantity}</td>
      <td class="r">${fmt(l.unit_price)} kr</td>
      <td class="r bold">${fmt(l.line_total)} kr</td>
    </tr>`).join("") || '<tr><td colspan="5" style="color:#a0aec0;text-align:center;padding:1rem">Ingen linjer</td></tr>';

  const statusBanner = (q.status === "accepted" || q.status === "rejected" || q.status === "sent")
    ? `<div class="status-banner status-${q.status}">${
        q.status === "accepted" ? `✅ Accepteret af kunden — ${fdate(q.accepted_at)}` :
        q.status === "rejected" ? `❌ Afvist af kunden — ${fdate(q.rejected_at)}${q.rejection_reason ? " · "+esc(q.rejection_reason) : ""}` :
        `📤 Sendt til kunde — afventer svar`
      }</div>` : "";

  const custBlock = customer ? `
    <div class="party-name">${esc(customer.name)}</div>
    ${customer.address  ? `<div class="party-detail">${esc(customer.address)}</div>` : ""}
    ${project?.address && project.address !== customer.address
        ? `<div class="party-detail">📍 ${esc(project.address)}</div>` : ""}
    ${customer.phone ? `<div class="party-detail">${esc(customer.phone)}</div>` : ""}
    ${customer.email ? `<div class="party-detail">${esc(customer.email)}</div>` : ""}
  ` : `<div class="party-detail" style="color:#a0aec0">Ingen kundeoplysninger</div>`;

  root.innerHTML = `
  <div class="page">
    <div class="doc-header">
      <div>
        <div class="doc-type">TILBUD</div>
        <div class="doc-number">${esc(q.quote_number)}</div>
      </div>
      <div class="company-block">
        ${company.logo_url ? `<img src="${esc(company.logo_url)}" alt="" class="company-logo">` : ""}
        <div class="company-name">${esc(company.name)}</div>
        ${company.address ? `<div class="company-detail">${esc(company.address)}</div>` : ""}
        ${company.phone   ? `<div class="company-detail">${esc(company.phone)}</div>` : ""}
        ${company.email   ? `<div class="company-detail">${esc(company.email)}</div>` : ""}
        ${company.cvr_masked ? `<div class="company-detail">CVR ${esc(company.cvr_masked)}</div>` : ""}
      </div>
    </div>

    <div class="parties">
      <div>
        <div class="party-label">Tilbud til</div>
        ${custBlock}
      </div>
      <div class="doc-meta">
        <div class="meta-row"><span class="meta-label">Tilbudsnr.</span><span class="meta-val">${esc(q.quote_number)}</span></div>
        ${q.valid_until ? `<div class="meta-row"><span class="meta-label">Gyldig til</span><span class="meta-val${isOverdue(q.valid_until) && q.status === "sent" ? " overdue" : ""}">${fdate(q.valid_until)}</span></div>` : ""}
        ${project ? `<div class="meta-row"><span class="meta-label">Projekt</span><span class="meta-val">${esc(project.title)}</span></div>` : ""}
      </div>
    </div>

    ${statusBanner}

    ${q.description ? `<div style="margin-bottom:1.5rem;font-size:.9rem;color:#4a5568">${esc(q.description)}</div>` : ""}

    <div class="lines-section">
      <table>
        <thead>
          <tr>
            <th>Beskrivelse</th><th>Enhed</th>
            <th class="r">Antal</th><th class="r">Enhedspris</th><th class="r">Beløb</th>
          </tr>
        </thead>
        <tbody>${linesHtml}</tbody>
      </table>
    </div>

    <div class="totals">
      <div class="totals-inner">
        <div class="total-row"><span>Subtotal ekskl. moms</span><span>${fmt(q.subtotal)} kr</span></div>
        <div class="total-row vat-note"><span>Moms (25%)</span><span>${fmt(q.vat_amount)} kr</span></div>
        <div class="total-row final"><span>Total inkl. moms</span><span>${fmt(q.total)} kr</span></div>
      </div>
    </div>

    ${q.notes ? `<div class="notes-label">Bemærkninger</div><div class="notes-box">${esc(q.notes)}</div>` : ""}

    <div class="doc-footer">${esc(company.name)}${company.cvr_masked ? " · CVR "+esc(company.cvr_masked) : ""}${company.phone ? " · "+esc(company.phone) : ""}${company.email ? " · "+esc(company.email) : ""}</div>
  </div>`;
}

// ── INVOICE ───────────────────────────────────────────────────────────────────
async function renderInvoice(root) {
  const [inv, company] = await Promise.all([
    fetchJSON(`/invoices/${ID}`),
    fetchJSON(`/companies/${CID}`),
  ]);
  document.title = `${inv.invoice_number} — ${company.name}`;

  let customer = null;
  try { customer = await fetchJSON(`/customers/${inv.customer_id}`); } catch (_) {}

  const today = new Date().toISOString().slice(0, 10);
  const overdue = inv.status === "sent" && inv.due_date < today;

  const linesHtml = (inv.lines || []).map(l => `
    <tr>
      <td>${esc(l.description)}</td>
      <td>${esc(l.unit || "")}</td>
      <td class="r">${l.quantity}</td>
      <td class="r">${fmt(l.unit_price)} kr</td>
      <td class="r bold">${fmt(l.line_total)} kr</td>
    </tr>`).join("") || '<tr><td colspan="5" style="color:#a0aec0;text-align:center;padding:1rem">Ingen linjer</td></tr>';

  const statusBanner = inv.status !== "draft"
    ? `<div class="status-banner status-${inv.status}">${
        inv.status === "paid"      ? `✅ Betalt` :
        inv.status === "cancelled" ? `❌ Annulleret` :
        overdue                    ? `⚠️ FORFALDEN — forfald var ${fdate(inv.due_date)}` :
                                     `📤 Sendt — forfald ${fdate(inv.due_date)}`
      }</div>` : "";

  const custBlock = customer ? `
    <div class="party-name">${esc(customer.name)}</div>
    ${customer.address  ? `<div class="party-detail">${esc(customer.address)}</div>` : ""}
    ${customer.phone ? `<div class="party-detail">${esc(customer.phone)}</div>` : ""}
    ${customer.email ? `<div class="party-detail">${esc(customer.email)}</div>` : ""}
    ${customer.cvr_masked ? `<div class="party-detail">CVR ${esc(customer.cvr_masked)}</div>` : ""}
  ` : `<div class="party-detail" style="color:#a0aec0">Ingen kundeoplysninger</div>`;

  root.innerHTML = `
  <div class="page">
    <div class="doc-header">
      <div>
        <div class="doc-type">FAKTURA</div>
        <div class="doc-number">${esc(inv.invoice_number)}</div>
      </div>
      <div class="company-block">
        ${company.logo_url ? `<img src="${esc(company.logo_url)}" alt="" class="company-logo">` : ""}
        <div class="company-name">${esc(company.name)}</div>
        ${company.address ? `<div class="company-detail">${esc(company.address)}</div>` : ""}
        ${company.phone   ? `<div class="company-detail">${esc(company.phone)}</div>` : ""}
        ${company.email   ? `<div class="company-detail">${esc(company.email)}</div>` : ""}
        ${company.cvr_masked ? `<div class="company-detail">CVR ${esc(company.cvr_masked)}</div>` : ""}
      </div>
    </div>

    <div class="parties">
      <div>
        <div class="party-label">Faktureres til</div>
        ${custBlock}
      </div>
      <div class="doc-meta">
        <div class="meta-row"><span class="meta-label">Fakturanr.</span><span class="meta-val">${esc(inv.invoice_number)}</span></div>
        <div class="meta-row"><span class="meta-label">Udstedt</span><span class="meta-val">${fdate(inv.issue_date)}</span></div>
        <div class="meta-row"><span class="meta-label">Forfaldsdato</span><span class="meta-val${overdue ? " overdue" : ""}">${fdate(inv.due_date)}</span></div>
      </div>
    </div>

    ${statusBanner}

    ${inv.description ? `<div style="margin-bottom:1.5rem;font-size:.9rem;color:#4a5568">${esc(inv.description)}</div>` : ""}

    <div class="lines-section">
      <table>
        <thead>
          <tr>
            <th>Beskrivelse</th><th>Enhed</th>
            <th class="r">Antal</th><th class="r">Enhedspris</th><th class="r">Beløb</th>
          </tr>
        </thead>
        <tbody>${linesHtml}</tbody>
      </table>
    </div>

    <div class="totals">
      <div class="totals-inner">
        <div class="total-row"><span>Subtotal ekskl. moms</span><span>${fmt(inv.subtotal)} kr</span></div>
        <div class="total-row vat-note"><span>Moms (25%)</span><span>${fmt(inv.vat_amount)} kr</span></div>
        <div class="total-row final"><span>Total inkl. moms</span><span>${fmt(inv.total)} kr</span></div>
      </div>
    </div>

    ${inv.notes ? `<div class="notes-label">Bemærkninger</div><div class="notes-box">${esc(inv.notes)}</div>` : ""}

    <div class="doc-footer">${esc(company.name)}${company.cvr_masked ? " · CVR "+esc(company.cvr_masked) : ""}${company.phone ? " · "+esc(company.phone) : ""}${company.email ? " · "+esc(company.email) : ""}</div>
  </div>`;
}

load();
</script>
<script src="/static/nav.js"></script>
</body>
</html>
