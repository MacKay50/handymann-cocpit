// ── QUOTE FORM ────────────────────────────────────────────────────────────────
let _qLines = [];

function addQLine() {
  _qLines.push({ description: "", unit: "time", quantity: "", unit_price: "" });
  renderQLines();
}
function removeQLine(i) {
  _qLines.splice(i, 1);
  renderQLines();
}
function updateQLine(i, f, v) {
  _qLines[i][f] = v;
  const qty = parseFloat(_qLines[i].quantity) || 0;
  const price = parseFloat(_qLines[i].unit_price) || 0;
  const el = document.getElementById(`ql-total-${i}`);
  if (el) el.textContent = fmt(qty * price) + " kr";
  updateQSubtotal();
}
function updateQSubtotal() {
  const sub = _qLines.reduce((s, l) => s + (parseFloat(l.quantity)||0) * (parseFloat(l.unit_price)||0), 0);
  const el = document.getElementById("ql-subtotal");
  if (el) el.textContent = fmt(sub) + " kr";
  const vatEl = document.getElementById("ql-vat");
  if (vatEl) vatEl.textContent = fmt(sub * 0.25) + " kr";
  const totEl = document.getElementById("ql-total");
  if (totEl) totEl.textContent = fmt(sub * 1.25) + " kr";
}
function renderQLines() {
  const container = document.getElementById("ql-container");
  if (!container) return;
  if (!_qLines.length) {
    container.innerHTML = `<p style="font-size:.85rem;color:#a0aec0;padding:.4rem 0">Ingen linjer — klik "+ Tilføj linje"</p>`;
    updateQSubtotal();
    return;
  }
  const units = ["m2","stk","time","lm","l","km"];
  container.innerHTML = `<div class="dw-table-wrap"><table>
    <thead><tr><th>Beskrivelse</th><th>Enhed</th><th style="text-align:right">Antal</th><th style="text-align:right">Stk.pris</th><th style="text-align:right">Total</th><th></th></tr></thead>
    <tbody>${_qLines.map((l, i) => `
      <tr>
        <td><input type="text" value="${esc(l.description)}" placeholder="Beskrivelse…"
          style="border:none;width:100%;min-width:120px;font-size:.83rem;padding:.15rem .3rem;outline:none;background:transparent"
          oninput="updateQLine(${i},'description',this.value)"></td>
        <td><select onchange="updateQLine(${i},'unit',this.value)"
          style="border:none;font-size:.83rem;background:transparent;outline:none;cursor:pointer">
          ${units.map(u => `<option value="${u}"${l.unit===u?" selected":""}>${u}</option>`).join("")}
        </select></td>
        <td><input type="number" value="${l.quantity}" placeholder="0" min="0.01" step="any"
          style="border:none;width:60px;text-align:right;font-size:.83rem;padding:.15rem .3rem;outline:none;background:transparent"
          oninput="updateQLine(${i},'quantity',this.value)"></td>
        <td><input type="number" value="${l.unit_price}" placeholder="0" min="0" step="any"
          style="border:none;width:75px;text-align:right;font-size:.83rem;padding:.15rem .3rem;outline:none;background:transparent"
          oninput="updateQLine(${i},'unit_price',this.value)"></td>
        <td style="text-align:right" id="ql-total-${i}" class="amt">${fmt((parseFloat(l.quantity)||0)*(parseFloat(l.unit_price)||0))} kr</td>
        <td><button onclick="removeQLine(${i})" style="background:none;border:none;color:#cbd5e0;cursor:pointer;font-size:1rem;line-height:1;padding:.1rem .3rem" title="Fjern">✕</button></td>
      </tr>`).join("")}
    </tbody></table></div>`;
  updateQSubtotal();
}

    renderOverview();
  } catch(e) {
    btn.disabled = false; btn.textContent = id ? "Gem ændringer" : "Opret faktura-kladde";
    showToast("Fejl: " + e.message, true);
  }
}

// ── API write helpers ─────────────────────────────────────────────────────────
async function apiPost(path, body) {
  const r = await fetch(BASE + path, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
  if (!r.ok) { const t = await r.text(); throw new Error(`${r.status} — ${t.slice(0,120)}`); }
  return r.json();
}
async function apiPatch(path, body) {
  const r = await fetch(BASE + path, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
  if (!r.ok) { const t = await r.text(); throw new Error(`${r.status} — ${t.slice(0,120)}`); }
  return r.json();
}
async function apiDel(path) {
  const r = await fetch(BASE + path, { method: "DELETE" });
  if (!r.ok) { const t = await r.text(); throw new Error(`${r.status} — ${t.slice(0,120)}`); }
  if (r.status === 204) return {};
  return r.json();
}

// ── Reload + toast ────────────────────────────────────────────────────────────
async function reloadData() {
  const [customers, projects] = await Promise.all([
    api(`/customers/?company_id=${CID}`),
    api(`/projects/?company_id=${CID}`),
  ]);
  S.customers = customers;
  S.projects  = projects;
  CM = Object.fromEntries(customers.map(c => [c.id, c.name]));
  PM = Object.fromEntries(projects.map(p => [p.id, p.title]));
}

let _toastTimer = null;
function showToast(msg, isError = false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.background = isError ? "#c53030" : "#276749";
  el.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n == null) return "0";
  return Number(n).toLocaleString("da-DK", {maximumFractionDigits: 0});
}
function fdate(d) {
  if (!d) return "—";
  const s = String(d).slice(0,10);
  const [y,m,day] = s.split("-");
  return `${day}/${m}/${y}`;
}
function fdtime(d) {
  if (!d) return "—";
  const dt = new Date(d);
  return dt.toLocaleString("da-DK", {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
}
const LABELS = {
  draft:"Kladde", sent:"Sendt", paid:"Betalt", cancelled:"Annulleret",
  active:"Aktiv", completed:"Afsluttet", archived:"Arkiveret",
  accepted:"Accepteret", converted:"Konverteret",
  unread:"Ulæst", read:"Læst", pending:"Afventer", done:"Udført",
  phone:"Telefon", email:"E-mail", overdue:"Forfalden",
  scheduled:"Planlagt", skipped:"Sprunget over",
  site_visit:"Besigtigelse", meeting:"Møde", estimate:"Tilbudsrunde",
  vat_report:"Moms", salary_run:"Løn", annual_accounts:"Årsregnskab",
  corporate_tax:"Selskabsskat", insurance:"Forsikring",
};
function slabel(s) { return LABELS[s] || s || "—"; }
function esc(s) {
  return String(s||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── ERFARINGSBANK TAB ────────────────────────────────────────────────────────
async function renderErfaringsbankTab() {
  const el = document.getElementById("tab-erfaringsbank");
  el.innerHTML = `<div class="sh" style="margin-top:0">
    <div style="display:flex;align-items:center;gap:.7rem"><h2>Erfaringsbank</h2><div id="erfar-count" class="cnt">…</div></div>
    <a class="btn-prep" href="/export?type=erfaringsbank&company_id=${CID}" target="_blank">📥 Eksport</a>
  </div>
    <div class="erfar-import-box">
      <strong style="font-size:.88rem">Importer historisk tilbud (lokal fil)</strong>
      <div class="erfar-import-row">
        <input id="erfar-path" placeholder="Sti til fil, fx C:\\Tilbud\\tilbud2024.pdf" />
        <button class="btn-save" style="white-space:nowrap" onclick="erfarImport()">Importer fil</button>
      </div>
      <div id="erfar-import-msg" style="font-size:.82rem;margin-top:.4rem;color:#718096"></div>
    </div>
    <div class="erfar-filter-row">
      <select id="erfar-filter-status" onchange="erfarLoad()">
        <option value="">Alle statusser</option>
        <option value="needs_review">Afventer godkendelse</option>
        <option value="approved">Godkendt</option>
      </select>
      <select id="erfar-filter-job" onchange="erfarLoad()">
        <option value="">Alle jobtyper</option>
        <option value="maling">Maling</option>
        <option value="spartling">Spartling</option>
        <option value="tapet">Tapet</option>
        <option value="facade">Facade</option>
        <option value="gulv">Gulv</option>
        <option value="fliser">Fliser</option>
      </select>
      <input id="erfar-filter-year-min" placeholder="År fra" style="width:80px" onchange="erfarLoad()" />
      <input id="erfar-filter-year-max" placeholder="År til" style="width:80px" onchange="erfarLoad()" />
    </div>
    <div id="erfar-list">Indlæser…</div>`;
  erfarLoad();
}

async function erfarLoad() {
  const status = document.getElementById("erfar-filter-status")?.value || "";
  const jobType = document.getElementById("erfar-filter-job")?.value || "";
  const yearMin = document.getElementById("erfar-filter-year-min")?.value || "";
  const yearMax = document.getElementById("erfar-filter-year-max")?.value || "";
  let url = `/historical-offers/?active_only=true`;
  if (status) url += `&extraction_status=${status}`;
  if (jobType) url += `&job_type=${jobType}`;
  if (yearMin) url += `&year_min=${yearMin}`;
  if (yearMax) url += `&year_max=${yearMax}`;
  try {
    const offers = await api(url);
    const listEl = document.getElementById("erfar-list");
    const cntEl  = document.getElementById("erfar-count");
    if (cntEl) cntEl.textContent = offers.length;
    if (!listEl) return;
    if (!offers.length) { listEl.innerHTML = '<div class="empty">Ingen tilbud endnu — importer din første fil ovenfor</div>'; return; }
    listEl.innerHTML = offers.map(o => `
      <div class="erfar-card ${o.extraction_status}">
        <div class="erfar-card-meta">
          <div class="erfar-card-title">${esc(o.title || o.source_file_path.split("\\").pop().split("/").pop())}
            <span class="b b-${o.extraction_status}" style="margin-left:.5rem;font-size:.72rem">${o.extraction_status==="approved"?"✓ Godkendt":"Afventer"}</span>
          </div>
          <div class="erfar-card-sub">
            ${[o.job_type, o.building_type, o.year ? o.year+"" : null, o.area_m2 ? o.area_m2+" m²" : null].filter(Boolean).join(" · ")}
          </div>
          ${o.extraction_status === "needs_review" ? `<div style="margin-top:.4rem;display:flex;gap:.4rem">
            <button class="btn-save" style="font-size:.75rem;padding:.2rem .65rem" onclick="erfarApprove('${o.id}')">Godkend</button>
            <button class="btn" style="font-size:.75rem;padding:.2rem .65rem" onclick="erfarEdit('${o.id}')">Rediger felter</button>
          </div>` : `<div style="margin-top:.4rem">
            <button class="btn" style="font-size:.75rem;padding:.2rem .65rem" onclick="erfarEdit('${o.id}')">Rediger</button>
          </div>`}
        </div>
        <div class="erfar-card-price">
          ${o.price_ex_vat ? fmt(o.price_ex_vat)+" kr" : "—"}
          ${o.price_per_m2 ? `<div style="font-size:.78rem;color:#718096;font-weight:400">${fmt(o.price_per_m2)} kr/m²</div>` : ""}
        </div>
      </div>`).join("");
  } catch(e) {
    const el = document.getElementById("erfar-list");
    if (el) el.innerHTML = `<div class="err-box">Fejl: ${esc(e.message)}</div>`;
  }
}

async function erfarImport() {
  const path = document.getElementById("erfar-path")?.value.trim();
  const msgEl = document.getElementById("erfar-import-msg");
  if (!path) { msgEl.textContent = "Angiv en filsti"; return; }
  msgEl.textContent = "Importerer…"; msgEl.style.color = "#718096";
  try {
    const job = await apiPost(`/historical-offers/import?company_id=${CID}&file_path=${encodeURIComponent(path)}`, {});
    msgEl.textContent = `✓ Import fuldført — status: ${job.status}`;
    msgEl.style.color = "#276749";
    document.getElementById("erfar-path").value = "";
    erfarLoad();
  } catch(e) {
    msgEl.textContent = "Fejl: " + e.message;
    msgEl.style.color = "#c53030";
  }
}

async function erfarApprove(id) {
  try {
    await apiPost(`/historical-offers/${id}/approve`, {});
    showToast("Tilbud godkendt til erfaringsbank");
    erfarLoad();
  } catch(e) { showToast("Fejl: "+e.message, true); }
}

function erfarEdit(id) {
  // Open a minimal edit drawer
  openDrawer("Rediger historisk tilbud", `<div id="erfar-edit-form-${id}">Indlæser…</div>`);
  api(`/historical-offers/${id}`).then(o => {
    document.getElementById(`erfar-edit-form-${id}`).innerHTML = `
      <div class="fg"><label>Titel</label><input id="ee-title" value="${esc(o.title||"")}" /></div>
      <div class="form-2col">
        <div class="fg"><label>Jobtype</label><input id="ee-job" value="${esc(o.job_type||"")}" /></div>
        <div class="fg"><label>Bygningstype</label><input id="ee-bld" value="${esc(o.building_type||"")}" /></div>
      </div>
      <div class="form-2col">
        <div class="fg"><label>År</label><input id="ee-year" type="number" value="${o.year||""}" /></div>
        <div class="fg"><label>Areal m²</label><input id="ee-area" type="number" value="${o.area_m2||""}" /></div>
      </div>
      <div class="form-2col">
        <div class="fg"><label>Pris ex. moms (kr)</label><input id="ee-price-ex" type="number" value="${o.price_ex_vat||""}" /></div>
        <div class="fg"><label>Pris inkl. moms (kr)</label><input id="ee-price-inc" type="number" value="${o.price_inc_vat||""}" /></div>
      </div>
      <div class="fg"><label>Opsummering</label><textarea id="ee-summary">${esc(o.summary||"")}</textarea></div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeDrawer()">Annuller</button>
        <button class="btn-save" onclick="erfarSave('${id}')">Gem</button>
      </div>`;
  });
}

async function erfarSave(id) {
  const payload = {};
  const title = document.getElementById("ee-title")?.value.trim();
  const job   = document.getElementById("ee-job")?.value.trim();
  const bld   = document.getElementById("ee-bld")?.value.trim();
  const year  = document.getElementById("ee-year")?.value;
  const area  = document.getElementById("ee-area")?.value;
  const pex   = document.getElementById("ee-price-ex")?.value;
  const pinc  = document.getElementById("ee-price-inc")?.value;
  const sum   = document.getElementById("ee-summary")?.value.trim();
  if (title)  payload.title = title;
  if (job)    payload.job_type = job;
  if (bld)    payload.building_type = bld;
  if (year)   payload.year = parseInt(year);
  if (area)   payload.area_m2 = parseFloat(area);
  if (pex)    payload.price_ex_vat = parseFloat(pex);
  if (pinc)   payload.price_inc_vat = parseFloat(pinc);
  if (sum)    payload.summary = sum;
  try {
    await apiPatch(`/historical-offers/${id}`, payload);
    closeDrawer();
    showToast("Tilbud opdateret");
    erfarLoad();
  } catch(e) { showToast("Fejl: "+e.message, true); }
}
